<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Task Board</title>
  <meta name="description" content="A professional, modular Kanban Task Board. Drag and drop tasks, filter by priority, and toggle dark mode." />
  <meta name="theme-color" content="#4F46E5" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="layout">

  <!-- ══════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════ -->
  <header class="header" role="banner">

    <!-- Logo -->
    <a class="header__logo" href="#main" aria-label="Kanban Task Board">
      <div class="header__logo-icon" aria-hidden="true">
        <!-- Board icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect x="2"    y="3" width="6"  height="18" rx="1.5"/>
          <rect x="9.5"  y="3" width="5"  height="12" rx="1.5"/>
          <rect x="16.5" y="3" width="5.5" height="15" rx="1.5"/>
        </svg>
      </div>
      <span class="header__logo-text">KanbanBoard</span>
    </a>

    <!-- Search -->
    <div class="header__search" role="search">
      <span class="header__search-icon" aria-hidden="true">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input
        type="search"
        id="searchInput"
        class="header__search-input"
        placeholder="Search tasks… (⌘K)"
        aria-label="Search tasks"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <!-- Controls -->
    <div class="header__controls">

      <!-- Priority filter -->
      <select id="priorityFilter" class="filter-select" aria-label="Filter by priority">
        <option value="all">All Priorities</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>

      <!-- Dark-mode toggle -->
      <button
        id="themeToggle"
        class="icon-btn"
        aria-label="Switch to dark mode"
        title="Switch to dark mode"
        type="button"
      >
        <!-- Sun icon (shown in light mode) -->
        <svg id="themeIconLight" width="17" height="17" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"     x2="12" y2="3"/>
          <line x1="12" y1="21"    x2="12" y2="23"/>
          <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"  y1="12"    x2="3"  y2="12"/>
          <line x1="21" y1="12"    x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon icon (shown in dark mode) -->
        <svg id="themeIconDark" width="17" height="17" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"
             class="u-hidden" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <!-- Add Task -->
      <button
        id="openAddModal"
        class="btn-primary"
        aria-haspopup="dialog"
        aria-label="Add new task (⌘N)"
        type="button"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5"  y1="12" x2="19" y2="12"/>
        </svg>
        Add Task
      </button>

    </div>
  </header>

  <!-- ══════════════════════════════════════════
       BOARD AREA
  ══════════════════════════════════════════ -->
  <main id="main" class="board-area" tabindex="-1">

    <div class="board-wrapper">

      <!-- Stats Row -->
      <div class="stats-row" role="status" aria-live="polite" aria-label="Task summary">
        <span class="stats-row__label">Board</span>

        <div class="stats-chip" title="To Do tasks">
          <span class="dot" style="background:var(--clr-col-todo)"></span>
          <span id="statTodo">0</span> To Do
        </div>
        <div class="stats-chip" title="In Progress tasks">
          <span class="dot" style="background:var(--clr-col-progress)"></span>
          <span id="statProgress">0</span> In Progress
        </div>
        <div class="stats-chip" title="Done tasks">
          <span class="dot" style="background:var(--clr-col-done)"></span>
          <span id="statDone">0</span> Done
        </div>
        <div class="stats-chip stats-chip--total" title="Total tasks">
          <span class="dot" style="background:var(--clr-brand)"></span>
          <span id="statTotal">0</span> Total
        </div>
      </div>

      <!-- Board -->
      <div class="board" role="region" aria-label="Kanban board columns">

        <!-- ── To Do Column ── -->
        <section
          class="column column-todo"
          id="col-todo"
          aria-label="To Do column"
          data-column="todo"
        >
          <div class="column-header">
            <div class="column-header__title-group">
              <span class="col-dot" aria-hidden="true"></span>
              <h2 class="column-title">To Do</h2>
              <span class="column-badge" id="badge-todo" aria-label="task count">0</span>
            </div>
            <button
              class="column-add-btn"
              data-column="todo"
              aria-label="Add task to To Do"
              title="Add task"
              type="button"
            >
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2.5"
                   stroke-linecap="round" stroke-linejoin="round"
                   aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5"  y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>
          <div
            class="column-body"
            id="cards-todo"
            role="list"
            aria-label="To Do tasks"
            data-column="todo"
          ></div>
        </section>

        <!-- ── In Progress Column ── -->
        <section
          class="column column-progress"
          id="col-progress"
          aria-label="In Progress column"
          data-column="progress"
        >
          <div class="column-header">
            <div class="column-header__title-group">
              <span class="col-dot" aria-hidden="true"></span>
              <h2 class="column-title">In Progress</h2>
              <span class="column-badge" id="badge-progress" aria-label="task count">0</span>
            </div>
            <button
              class="column-add-btn"
              data-column="progress"
              aria-label="Add task to In Progress"
              title="Add task"
              type="button"
            >
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2.5"
                   stroke-linecap="round" stroke-linejoin="round"
                   aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5"  y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>
          <div
            class="column-body"
            id="cards-progress"
            role="list"
            aria-label="In Progress tasks"
            data-column="progress"
          ></div>
        </section>

        <!-- ── Done Column ── -->
        <section
          class="column column-done"
          id="col-done"
          aria-label="Done column"
          data-column="done"
        >
          <div class="column-header">
            <div class="column-header__title-group">
              <span class="col-dot" aria-hidden="true"></span>
              <h2 class="column-title">Done</h2>
              <span class="column-badge" id="badge-done" aria-label="task count">0</span>
            </div>
            <button
            class="column-add-btn"
            data-column="done"
            aria-label="Add task to Done"
            title="Add task"
            type="button"
          >
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5"  y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div
          class="column-body"
          id="cards-done"
          role="list"
          aria-label="Done tasks"
          data-column="done"
        ></div>
      </section>

    </div><!-- /.board -->
      </div><!-- /.board-wrapper -->
  </main>

</div><!-- /.layout -->

<!-- ══════════════════════════════════════════
     ADD TASK MODAL
══════════════════════════════════════════ -->
<dialog id="addModal" aria-labelledby="addModalTitle" aria-modal="true">
  <div class="modal" role="document">

    <div class="modal__header">
      <div class="modal__title-group">
        <span class="modal__icon modal__icon--add" aria-hidden="true">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8"  y1="12" x2="16" y2="12"/>
          </svg>
        </span>
        <h2 class="modal__title" id="addModalTitle">New Task</h2>
      </div>
      <button class="modal__close" id="closeAddModal" aria-label="Close dialog" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <line x1="18" y1="6"  x2="6"  y2="18"/>
          <line x1="6"  y1="6"  x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal__body">

      <!-- Title -->
      <div class="form-group">
        <label class="form-label" for="addTitle">
          Title <span class="form-required" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="addTitle"
          class="form-input"
          placeholder="e.g. Redesign login page…"
          maxlength="120"
          required
          autocomplete="off"
        />
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="form-label" for="addDesc">Description</label>
        <textarea
          id="addDesc"
          class="form-textarea"
          placeholder="Add more detail about this task…"
          maxlength="500"
        ></textarea>
      </div>

      <!-- Priority -->
      <div class="form-group">
        <span class="form-label" id="addPriorityLabel">Priority</span>
        <div class="priority-options" role="radiogroup" aria-labelledby="addPriorityLabel">
          <div class="priority-option priority-option--low">
            <input type="radio" name="addPriority" id="addPriorityLow" value="low" checked />
            <label for="addPriorityLow"><span class="p-dot"></span>Low</label>
          </div>
          <div class="priority-option priority-option--medium">
            <input type="radio" name="addPriority" id="addPriorityMedium" value="medium" />
            <label for="addPriorityMedium"><span class="p-dot"></span>Medium</label>
          </div>
          <div class="priority-option priority-option--high">
            <input type="radio" name="addPriority" id="addPriorityHigh" value="high" />
            <label for="addPriorityHigh"><span class="p-dot"></span>High</label>
          </div>
        </div>
      </div>

      <!-- Due Date -->
      <div class="form-group">
        <label class="form-label" for="addDueDate">Due Date</label>
        <input type="date" id="addDueDate" class="form-input" />
      </div>

      <!-- Column -->
      <div class="form-group">
        <span class="form-label" id="addColumnLabel">Add to Column</span>
        <div class="column-options" role="radiogroup" aria-labelledby="addColumnLabel">
          <div class="column-option column-option--todo">
            <input type="radio" name="addColumn" id="addColTodo" value="todo" checked />
            <label for="addColTodo"><span class="c-dot"></span>To Do</label>
          </div>
          <div class="column-option column-option--progress">
            <input type="radio" name="addColumn" id="addColProgress" value="progress" />
            <label for="addColProgress"><span class="c-dot"></span>In Progress</label>
          </div>
          <div class="column-option column-option--done">
            <input type="radio" name="addColumn" id="addColDone" value="done" />
            <label for="addColDone"><span class="c-dot"></span>Done</label>
          </div>
        </div>
      </div>

    </div><!-- /.modal__body -->

    <div class="modal__footer">
      <button type="button" class="btn-secondary" id="cancelAdd">Cancel</button>
      <button type="button" class="btn-primary"   id="saveAdd">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Create Task
      </button>
    </div>

  </div>
</dialog>

<!-- ══════════════════════════════════════════
     EDIT TASK MODAL
══════════════════════════════════════════ -->
<dialog id="editModal" aria-labelledby="editModalTitle" aria-modal="true">
  <div class="modal" role="document">

    <div class="modal__header">
      <div class="modal__title-group">
        <span class="modal__icon modal__icon--edit" aria-hidden="true">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/>
          </svg>
        </span>
        <h2 class="modal__title" id="editModalTitle">Edit Task</h2>
      </div>
      <button class="modal__close" id="closeEditModal" aria-label="Close dialog" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <line x1="18" y1="6"  x2="6"  y2="18"/>
          <line x1="6"  y1="6"  x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal__body">

      <input type="hidden" id="editTaskId" />

      <!-- Title -->
      <div class="form-group">
        <label class="form-label" for="editTitle">
          Title <span class="form-required" aria-hidden="true">*</span>
        </label>
        <input
          type="text"
          id="editTitle"
          class="form-input"
          placeholder="Task title…"
          maxlength="120"
          required
          autocomplete="off"
        />
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="form-label" for="editDesc">Description</label>
        <textarea
          id="editDesc"
          class="form-textarea"
          placeholder="Task description…"
          maxlength="500"
        ></textarea>
      </div>

      <!-- Priority -->
      <div class="form-group">
        <span class="form-label" id="editPriorityLabel">Priority</span>
        <div class="priority-options" role="radiogroup" aria-labelledby="editPriorityLabel">
          <div class="priority-option priority-option--low">
            <input type="radio" name="editPriority" id="editPriorityLow" value="low" />
            <label for="editPriorityLow"><span class="p-dot"></span>Low</label>
          </div>
          <div class="priority-option priority-option--medium">
            <input type="radio" name="editPriority" id="editPriorityMedium" value="medium" />
            <label for="editPriorityMedium"><span class="p-dot"></span>Medium</label>
          </div>
          <div class="priority-option priority-option--high">
            <input type="radio" name="editPriority" id="editPriorityHigh" value="high" />
            <label for="editPriorityHigh"><span class="p-dot"></span>High</label>
          </div>
        </div>
      </div>

      <!-- Due Date -->
      <div class="form-group">
        <label class="form-label" for="editDueDate">Due Date</label>
        <input type="date" id="editDueDate" class="form-input" />
      </div>

      <!-- Column -->
      <div class="form-group">
        <span class="form-label" id="editColumnLabel">Move to Column</span>
        <div class="column-options" role="radiogroup" aria-labelledby="editColumnLabel">
          <div class="column-option column-option--todo">
            <input type="radio" name="editColumn" id="editColTodo" value="todo" />
            <label for="editColTodo"><span class="c-dot"></span>To Do</label>
          </div>
          <div class="column-option column-option--progress">
            <input type="radio" name="editColumn" id="editColProgress" value="progress" />
            <label for="editColProgress"><span class="c-dot"></span>In Progress</label>
          </div>
          <div class="column-option column-option--done">
            <input type="radio" name="editColumn" id="editColDone" value="done" />
            <label for="editColDone"><span class="c-dot"></span>Done</label>
          </div>
        </div>
      </div>

    </div><!-- /.modal__body -->

    <div class="modal__footer modal__footer--split">
      <!--
        Delete button inside Edit modal.
        Flow enforced in ui.js _handleEditModalDelete():
          closeAllModals()  → Edit modal closes completely
          openDeleteModal() → Only Delete modal is shown
        This prevents any modal from stacking.
      -->
      <button
        type="button"
        class="btn-danger-ghost"
        id="editDeleteBtn"
        aria-label="Delete this task"
        title="Delete task"
      >
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
        </svg>
        Delete
      </button>

      <div class="modal__footer-actions">
        <button type="button" class="btn-secondary" id="cancelEdit">Cancel</button>
        <button type="button" class="btn-primary"   id="saveEdit">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Save Changes
        </button>
      </div>
    </div>

  </div>
</dialog>

<!-- ══════════════════════════════════════════
     DELETE CONFIRM MODAL
     (always opened via closeAllModals() first —
      ensures it never stacks over another modal)
══════════════════════════════════════════ -->
<dialog id="deleteModal" aria-labelledby="deleteModalTitle" aria-modal="true">
  <div class="modal modal--sm" role="document">

    <div class="modal__header">
      <div class="modal__title-group">
        <span class="modal__icon modal__icon--delete" aria-hidden="true">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
        </span>
        <h2 class="modal__title" id="deleteModalTitle">Delete Task</h2>
      </div>
      <button class="modal__close" id="closeDeleteModal" aria-label="Close dialog" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <line x1="18" y1="6"  x2="6"  y2="18"/>
          <line x1="6"  y1="6"  x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal__body">
      <div class="delete-confirm">
        <div class="delete-confirm__icon-wrap" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9"  x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <p class="delete-confirm__title">Delete this task?</p>
        <p class="delete-confirm__desc">
          <span id="deleteTaskName"></span> will be permanently removed.
          This action cannot be undone.
        </p>
      </div>
    </div>

    <div class="modal__footer">
      <button type="button" class="btn-secondary" id="cancelDelete">Keep Task</button>
      <button type="button" class="btn-danger"    id="confirmDelete">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
        </svg>
        Delete Task
      </button>
    </div>

  </div>
</dialog>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- ══════════════════════════════════════════
     SCRIPTS — modular, in dependency order
     No business logic in this file.
══════════════════════════════════════════ -->
<script src="./js/storage.js"></script>
<script src="./js/crud.js"></script>
<script src="./js/dragdrop.js"></script>
<script src="./js/features.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
